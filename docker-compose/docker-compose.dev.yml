services:
  # MySQL & Redis 使用本地已有的镜像
  mysql:
    image: mysql:8.0.30
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mcpcan}
      MYSQL_USER: ${MYSQL_USER:-mcpcan}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mcpcan}
    volumes:
      - ${HOST_MYSQL_PATH:-./data/mysql}:/var/lib/mysql
      - ./config/mysql.conf:/etc/mysql/conf.d/mysql.conf:ro
      - ./config/mysql.init.sql:/docker-entrypoint-initdb.d/mysql.init.sql:ro
    ports:
      - "3306:3306"
    networks:
      - mcpcan-network
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD:-root}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:6-alpine
    container_name: redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-123456}
    volumes:
      - ${HOST_REDIS_PATH:-./data/redis}:/data
    ports:
      - "6379:6379"
    networks:
      - mcpcan-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-123456}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Market 服务：使用热加载
  mcp-market:
    build:
      context: ../../
      dockerfile: ./mcpcan-deploy/docker-compose/Dockerfile.go.dev
    container_name: mcp-market-dev
    volumes:
      - ../../mcpcan/backend:/app:cached
      - ./air.market.toml:/app/.air.toml:ro
      - ./config/market.yaml:/app/config/market.yaml:ro
    ports:
      - "8080:8080"
      - "2345:2345"
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor=unconfined
    networks:
      - mcpcan-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Authz 服务：使用热加载
  mcp-authz:
    build:
      context: ../../
      dockerfile: ./mcpcan-deploy/docker-compose/Dockerfile.go.dev
    container_name: mcp-authz-dev
    volumes:
      - ../../mcpcan/backend:/app:cached
      - ./air.authz.toml:/app/.air.toml:ro
      - ./config/authz.yaml:/app/config/authz.yaml:ro
    ports:
      - "8081:8081"
      - "2346:2346"
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor=unconfined
    networks:
      - mcpcan-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Frontend 服务：使用热加载
  mcp-web:
    build:
      context: ../../
      dockerfile: ./mcpcan-deploy/docker-compose/Dockerfile.web.dev
    container_name: mcp-web-dev
    volumes:
      - ../../mcpcan/frontend:/app:cached
      - /app/node_modules # 关键：使用匿名卷隔离 node_modules
      - ./config/env.js:/app/public/env.js:ro
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    command: sh -c "pnpm install && pnpm dev --host 0.0.0.0"
    networks:
      - mcpcan-network

networks:
  mcpcan-network:
    driver: bridge
