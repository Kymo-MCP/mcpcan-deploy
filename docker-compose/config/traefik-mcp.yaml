global:
  sendAnonymousUsage: false

log:
  level: INFO

api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: mcpcan-network
  http:
    endpoint: "http://mcp-market:8080/internal/gateway/routes"
    pollInterval: "10s"
  file:
    filename: /etc/traefik/dynamic-mcp.yaml
    watch: true
