{{- if and .Values.ingress.tls.createSecret .Values.ingress.tls.enabled .Values.ingress.tls.crt .Values.ingress.tls.key }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.ingress.tls.secretName | default (printf "%s-secret" .Release.Name) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mcpcan.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-90"
type: kubernetes.io/tls
data:
  tls.crt: {{ .Values.ingress.tls.crt | b64enc }}
  tls.key: {{ .Values.ingress.tls.key | b64enc }}
{{- end }}

{{- if and .Values.global.registryAuth .Values.global.registryAuth.createSecret .Values.global.registryAuth.username .Values.global.registryAuth.password }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.global.registryAuth.secretName | default "mcpcan-registry-auth" }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mcpcan.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-95"
type: kubernetes.io/dockerconfigjson
data:
  {{- $server := include "mcpcan.registryServer" . -}}
  {{- $auth := printf "%s:%s" .Values.global.registryAuth.username .Values.global.registryAuth.password | b64enc -}}
  {{- $dockerconfig := dict "auths" (dict $server (dict "username" .Values.global.registryAuth.username "password" .Values.global.registryAuth.password "auth" $auth)) | toJson | b64enc -}}
  .dockerconfigjson: {{ $dockerconfig }}
{{- end }}
